name: Sync cf-deployment release versions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest cf-deployment release tag
        id: cf-deployment-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo cloudfoundry/cf-deployment --json tagName --jq '.tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest cf-deployment release: $TAG"

      - name: Checkout cf-deployment
        uses: actions/checkout@v4
        with:
          repository: cloudfoundry/cf-deployment
          ref: ${{ steps.cf-deployment-tag.outputs.tag }}
          path: cf-deployment
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Extract release versions and generate versions.yaml
        run: python3 scripts/sync-cf-deployment-versions.py cf-deployment/cf-deployment.yml

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf cf-deployment
          git fetch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b auto/sync-cf-deployment-versions
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "chore: update BOSH release versions from cf-deployment ${{ steps.cf-deployment-tag.outputs.tag }}"
          git push -f -u origin auto/sync-cf-deployment-versions
          gh pr create --fill --base main || echo "PR already exists"
