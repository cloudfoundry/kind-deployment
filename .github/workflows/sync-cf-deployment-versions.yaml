name: Sync cf-deployment release versions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      BRANCH: auto/sync-cf-deployment-versions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SERVICE_USER_GITHUB_TOKEN }}

      - name: Prepare sync branch
        run: |
          git config user.name "ard-wg-k8s-gitbot"
          git config user.email "kind-deployment@cloudfoundry.org"

          if git fetch origin "$BRANCH" 2>/dev/null; then
            git checkout "$BRANCH"
            if ! git rebase main; then
              git rebase --abort
              echo "::error::Rebase failed due to conflicts, manual resolution required."
              exit 1
            fi
          else
            git checkout -b "$BRANCH"
          fi

      - name: Get latest cf-deployment release tag
        id: cf-deployment-tag
        env:
          GH_TOKEN: ${{ secrets.SERVICE_USER_GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo cloudfoundry/cf-deployment --json tagName --jq '.tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest cf-deployment release: $TAG"

      - name: Extract release versions and update charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip3 install pyyaml requests
          python3 scripts/sync-cf-deployment-versions.py

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.SERVICE_USER_GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "chore: update BOSH release versions from cf-deployment ${{ steps.cf-deployment-tag.outputs.tag }}"
          git push --force-with-lease -u origin "$BRANCH"
          gh pr create --fill --base main || true
