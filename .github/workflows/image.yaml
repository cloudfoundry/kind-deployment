name: Publish docker image

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Bake target"
        required: true
        type: string

env:
  REGISTRY_PREFIX: ghcr.io/cloudfoundry/k8s/

jobs:
  build:
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            image: ubuntu-24.04
          - platform: linux/arm64
            image: ubuntu-24.04-arm
    runs-on: ["${{ matrix.image }}"]
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METADATA_PATH: ${{ runner.temp }}/metadata.json
          PLATFORM: ${{ matrix.platform }}
        id: bake
        # probably exporting digest and merging need to move into the script as well b/c we now may produce more than one image per run
        run: python scripts/latest-images.py ${{ inputs.target }}
      - name: Export digest
        id: export
        run: |
          PLATFORM=$(echo ${{ matrix.platform }} | cut -d'/' -f2)
          DIGESTS=$(jq -c 'map_values(."containerimage.digest")' ${{ runner.temp }}/metadata.json)
          echo "Digests: $DIGESTS"
          echo "digest-$PLATFORM=$(echo $DIGESTS | base64 -w 0)" >> $GITHUB_OUTPUT
