apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: dns
  namespace: cf-workloads
spec:
  endpointSelector:
    matchExpressions:
      - key: cloudfoundry.org/app-guid
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: credhub
spec:
  endpointSelector:
    matchExpressions:
      - key: cloudfoundry.org/app-guid
        operator: Exists
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            app: credhub
      toPorts:
        - ports:
            - port: "8844"
              protocol: TCP
---
apiVersion: cilium.io/v2
