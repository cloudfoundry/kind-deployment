{{ if .Values.cloudController.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: capi-db-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  completions: 1
  parallelism: 1
  manualSelector: false
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      name: capi-db-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: capi-db-migration
          image: {{ .Values.cloudController.image.repository }}:{{ default .Chart.AppVersion .Values.cloudController.image.tag }}
          imagePullPolicy: {{ .Values.cloudController.image.imagePullPolicy }}
          command: ["/usr/bin/setup-db.sh"]
          env:
            - name: DB_LOG_LEVEL
              value: all
            - name: STORAGE_CLI_PATH
              value: /storage-cli/storage-cli
          envFrom:
            - secretRef:
                name: cc-shared
          volumeMounts:
            - name: etc-cloud-controller
              mountPath: /etc/cloud-controller
            - name: cloud-controller
              mountPath: /etc/ssl/certs/cloud-controller
            - name: storage-cli
              mountPath: /storage-cli
      volumes:
        - name: cloud-controller
          secret:
            secretName: {{ required "cloudController.certificateSecret is required" .Values.cloudController.certificateSecret }}
        - name: etc-cloud-controller
          configMap:
            name: cloud-controller-configmap
        - name: storage-cli
          image:
            reference: storage-cli:{{ default .Chart.AppVersion .Values.cloudController.image.tag }}
            pullPolicy: IfNotPresent
{{- end }}
