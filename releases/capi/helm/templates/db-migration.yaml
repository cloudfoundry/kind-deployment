{{ if .Values.cloudController.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: capi-db-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  completions: 1
  parallelism: 1
  manualSelector: false
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      name: capi-db-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: capi-db-migration
          image: {{ .Values.cloudController.image.repository }}:{{ default .Chart.AppVersion .Values.cloudController.image.tag }}
          imagePullPolicy: {{ .Values.cloudController.image.imagePullPolicy }}
          command: ["/usr/bin/setup-db.sh"]
          env:
            - name: DB_LOG_LEVEL
              value: all
          envFrom:
            - secretRef:
                name: cc-shared
          volumeMounts:
            - name: etc-cloud-controller
              mountPath: /etc/cloud-controller
            - name: cloud-controller
              mountPath: /etc/ssl/certs/cloud-controller
            {{- if not .Values.ccdb.skipSSLVerify }}
            - name: postgres-ca
              mountPath: /etc/ssl/certs/postgres
              readOnly: true
            {{- end }}
      volumes:
        - name: cloud-controller
          secret:
            secretName: {{ required "cloudController.certificateSecret is required" .Values.cloudController.certificateSecret }}
        {{- if not .Values.ccdb.skipSSLVerify }}
        - name: postgres-ca
          secret:
            secretName: {{ required "ccdb.caCertificateSecret is required when ccdb.skipSSLVerify is false" .Values.ccdb.caCertificateSecret }}
        {{- end }}
        - name: etc-cloud-controller
          secret:
            secretName: cloud-controller-config
{{- end }}
