nfsbroker:
  enabled: false
  certificateSecret: ""
  oauthClientsSecret: ""
  credhubURL: https://credhub.{{ .Release.Namespace }}.svc.cluster.local:8844
  image:
    repository: ghcr.io/cloudfoundry/k8s/nfsbroker
    tag: ""
    imagePullPolicy: IfNotPresent
  resources: {}
  nodeSelector: ~
  tolerations: ~


nfsv3driver:
  enabled: false
  image:
    repository: ghcr.io/cloudfoundry/k8s/nfsv3driver
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector:
    cloudfoundry.org/cell: "true"
  tolerations:
    - key: cloudfoundry.org/cell
      operator: Equal
      value: "true"
      effect: NoSchedule
