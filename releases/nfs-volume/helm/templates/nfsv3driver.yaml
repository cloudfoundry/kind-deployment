{{- if .Values.nfsv3driver.enabled }}
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: nfsv3driver
  labels:
    app: nfsv3driver
spec:
  selector:
    matchLabels:
      app: nfsv3driver
  template:
    metadata:
      labels:
        app: nfsv3driver
    spec:
      initContainers:
        - name: init-rpcbind-dir
          image: {{ .Values.nfsv3driver.image.repository }}:{{ default .Chart.AppVersion .Values.nfsv3driver.image.tag }}
          imagePullPolicy: {{ .Values.nfsv3driver.image.imagePullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              mkdir -p /run/rpcbind
              # rpcbind init script checks 'stat -c "%U"' == "root" (by name).
              chown root:root /run/rpcbind
              chmod 0755 /run/rpcbind
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: rpcbind-run
              mountPath: /run/rpcbind
      containers:
        - name: nfsv3driver
          image: {{ .Values.nfsv3driver.image.repository }}:{{ default .Chart.AppVersion .Values.nfsv3driver.image.tag }}
          imagePullPolicy: {{ .Values.nfsv3driver.image.imagePullPolicy }}
          # nfsv3driver.sh (v7.53.0+) calls 'service rpcbind start' which fails
          # in containers because the Ubuntu init script requires /run/rpcbind
          # to be owned by root *before* it is created by the service wrapper.
          # We bypass nfsv3driver.sh entirely: start rpcbind directly with -w
          # (warm start / no daemon-ize check) and exec the driver binary.
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /run/rpcbind
              chown root:root /run/rpcbind
              chmod 0755 /run/rpcbind
              /sbin/rpcbind -w
              exec /usr/local/bin/nfsv3driver "$@"
            - --
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7589
          args:
            - --listenAddr=$(POD_IP):7589
            - --transport=tcp-json
            - --debugAddr=127.0.0.1:7689
            - --adminAddr=127.0.0.1:7590
            - --driversPath=/var/lib/rep/voldrivers
            - --mountDir=/var/lib/rep/volumes/nfs
            - --logLevel=info
            - --timeFormat=rfc3339
            - --mapfsPath=/usr/local/bin/mapfs
          {{- if .Values.nfsv3driver.resources }}
          resources:
            {{- toYaml .Values.nfsv3driver.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: voldrivers
              mountPath: /var/lib/rep/voldrivers
              mountPropagation: Bidirectional
            - name: nfs-mounts
              mountPath: /var/lib/rep/volumes/nfs
              mountPropagation: Bidirectional
            - name: rpcbind-run
              mountPath: /run/rpcbind
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
      {{- if .Values.nfsv3driver.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nfsv3driver.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.nfsv3driver.tolerations }}
      tolerations:
        {{- toYaml .Values.nfsv3driver.tolerations | nindent 8 }}
      {{- end }}
      volumes:
        - name: voldrivers
          hostPath:
            path: /var/lib/rep/voldrivers
        - name: nfs-mounts
          hostPath:
            path: /var/lib/rep/volumes/nfs
        - name: rpcbind-run
          emptyDir: {}
{{- end }}
