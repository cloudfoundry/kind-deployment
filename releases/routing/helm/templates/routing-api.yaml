{{- if .Values.routingApi.enabled }}
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: routing-api
  labels:
    app: routing-api
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/routing-api-config.yaml") . | sha256sum }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: routing-api
  template:
    metadata:
      labels:
        app: routing-api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/routing-api-config.yaml") . | sha256sum }}
    spec:
      shareProcessNamespace: true
      initContainers:
        - name: routing-api-init
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              yq '.sqldb.ca_cert = strenv(DB_CA_CRT)' /routing-api/routing-api.yaml > /tmp/routing-api.yaml
          env:
            - name: DB_CA_CRT
              valueFrom:
                secretKeyRef:
                  name: {{ required "routingApi.sqldb.caCertificateSecret is required when routingApi.sqldb.skipSSLVerify is false" .Values.routingApi.sqldb.caCertificateSecret }}
                  key: ca.crt
          volumeMounts:
            - name: routing-api-config
              mountPath: /routing-api
            - name: tmpdir
              mountPath: /tmp
      containers:
        - name: routing-api
          image: {{ .Values.routingApi.image.repository }}:{{ default .Chart.AppVersion .Values.routingApi.image.tag }}
          imagePullPolicy: {{ .Values.routingApi.image.imagePullPolicy }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          args:
          - -config=/tmp/routing-api.yaml
          - -ip=$(POD_IP)
          {{- if .Values.routingApi.resources }}
          resources:
            {{- toYaml .Values.routingApi.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: routing-api
              mountPath: /etc/ssl/routing-api
            - name: uaa
              mountPath: /etc/ssl/uaa
            - name: locket
              mountPath: /etc/ssl/locket
            - name: routing-api-config
              mountPath: /routing-api
            {{- if not .Values.routingApi.sqldb.skipSSLVerify }}
            - name: tmpdir
              mountPath: /tmp
            {{- end }}
        - name: route-registrar
          image: {{ .Values.routeRegistrar.image.repository }}:{{ .Values.routeRegistrar.image.tag }}
          imagePullPolicy: {{ .Values.routeRegistrar.image.imagePullPolicy }}
          env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          {{- if .Values.routeRegistrar.resources }}
          resources:
            {{- toYaml .Values.routeRegistrar.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: routing-api
              mountPath: /etc/ssl/certs/routing-api
            - name: etc-route-registrar
              mountPath: /etc/route-registrar-template
            - name: tmpdir
              mountPath: /tmp
      volumes:
        - name: routing-api
          secret:
            secretName: {{ required "routingApi.certificateSecret is required" .Values.routingApi.certificateSecret }}
        - name: uaa
          secret:
            secretName: {{ required "routingApi.uaaCertificateSecret is required" .Values.routingApi.uaaCertificateSecret }}
        - name: locket
          secret:
            secretName: {{ required "routingApi.locketCertificateSecret is required" .Values.routingApi.locketCertificateSecret }}
        - name: routing-api-config
          secret:
            secretName: routing-api-config
        - name: etc-route-registrar
          configMap:
            name: routing-api-route-registrar-config
        - name: tmpdir
          emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: routing-api
  labels:
    app: routing-api
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: https
      port: 3001
      targetPort: 3001
  selector:
    app: routing-api
{{- end }}
