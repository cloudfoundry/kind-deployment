{{- if .Values.tcpRouter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cf-tcp-router-configmap
data:
  cf-tcp-router.yaml: |-
    oauth:
      token_endpoint: uaa.{{ .Release.Namespace }}.svc.cluster.local
      client_name: "tcp_router"
      client_secret: {{ .Values.tcpRouter.oauthClientsSecret | quote }}
      port: 443
      skip_ssl_validation: false
      ca_certs: "/etc/ssl/cf-tcp-router/ca.crt"
    routing_api:
      uri: https://routing-api.{{ .Release.Namespace }}.svc.cluster.local
      port: 3001
      auth_disabled: false
      client_cert_path: "/etc/ssl/cf-tcp-router/tls.crt"
      ca_cert_path: "/etc/ssl/cf-tcp-router/ca.crt"
      client_private_key_path: "/etc/ssl/cf-tcp-router/tls.key"
    haproxy_pid_file: "/haproxy/haproxy.pid"
    isolation_segments: []
    reserved_system_component_ports: [2822, 2825, 3457, 3458, 3459, 3460, 3461, 8853, 9100, 14726, 14727, 14821, 14822, 14823, 14824, 14829, 14830, 14920, 14922, 15821, 17002, 53035, 53080]
    drain_wait: 20s
    backend_tls:
      enabled: true
      ca_cert_path: "/etc/ssl/cf-tcp-router/ca.crt"
      client_cert_and_key_path: "/tmp/tls-combined.pem"
    frontend_tls:
{{- end }}
