hostname: "credhub.{{ .Release.Namespace }}.svc.cluster.local"
uaa:
  address: "https://uaa.{{ .Release.Namespace }}.svc.cluster.local:8443"

image:
  repository: ghcr.io/cloudfoundry/k8s/credhub
  tag: ""
  imagePullPolicy: IfNotPresent

nodeSelector: ~
tolerations: ~

caCertificateSecret: ""

db:
  name: credhub
  password: ~
  user: postgres
  port: 5432
  address: postgresql.{{ .Release.Namespace }}.svc.cluster.local
  caCertificateSecret: ""
  skipSSLVerify: true
