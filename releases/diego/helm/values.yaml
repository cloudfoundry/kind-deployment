auctioneer:
  enabled: false
  certificateSecret: ""
  hostname: "auctioneer.{{ .Release.Namespace }}.svc.cluster.local"
  image:
    repository: ghcr.io/cloudfoundry/k8s/auctioneer
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~

bbs:
  enabled: false
  certificateSecret: ""
  hostname: "bbs.{{ .Release.Namespace }}.svc.cluster.local"
  image:
    repository: ghcr.io/cloudfoundry/k8s/bbs
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~

fileserver:
  enabled: false
  hostname: "fileserver.127-0-0-1.nip.io"
  image:
    repository: ghcr.io/cloudfoundry/k8s/fileserver
    # sync: release=cf-deployment
    tag: "56.2.0"
    imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~
  
locket:
  enabled: false
  certificateSecret: ""
  hostname: "locket.{{ .Release.Namespace }}.svc.cluster.local"
  image:
    repository: ghcr.io/cloudfoundry/k8s/locket
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~

sshProxy:
  enabled: false
  certificateSecret: ""
  hostname: "ssh-proxy.127-0-0-1.nip.io"
  oauthClientsSecret: ""
  image:
    repository: ghcr.io/cloudfoundry/k8s/ssh-proxy
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector: ~
  tolerations: ~

routeEmitter:
  enabled: false
  certificateSecret: ""
  natsCertificateSecret: ""
  loggregatorCertificateSecret: ""
  bbsCertificateSecret: ""
  locketCertificateSecret: ""
  uaaCertificateSecret: ""
  oauthClientsSecret: ""
  natsAddress: "nats.{{ .Release.Namespace }}.svc.cluster.local:4222"
  locketAddress: "locket.{{ .Release.Namespace }}.svc.cluster.local:8891"
  bbsAddress: "https://bbs.{{ .Release.Namespace }}.svc.cluster.local:8889"
  routingApi:
    enabled: false
    certificateSecret: ""
    address: "https://routing-api.{{ .Release.Namespace }}.svc.cluster.local"
    port: 3001
  uaaAddress: "https://uaa.{{ .Release.Namespace }}.svc.cluster.local:8443"
  enableInternalEmitter: true
  enableTcpEmitter: true
  image:
    repository: ghcr.io/cloudfoundry/k8s/route-emitter
    tag: ""
    imagePullPolicy: IfNotPresent
  nodeSelector:
    cloudfoundry.org/cell: "true"
  tolerations:
    - key: cloudfoundry.org/cell
      operator: Equal
      value: "true"
      effect: NoSchedule

diegodb:
  name: diego
  password: ~
  user: postgres
  port: 5432
  address: postgresql.{{ .Release.Namespace }}.svc.cluster.local
  caCertificateSecret: ""
  skipSSLVerify: true

locketdb:
  name: locket
  password: ~
  user: postgres
  port: 5432
  address: postgresql.{{ .Release.Namespace }}.svc.cluster.local
  caCertificateSecret: ""
  skipSSLVerify: true

sshProxyHostKey: ~
diegoSSHCredentials: ~
