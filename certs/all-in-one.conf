[ req ]
default_bits        = 2048
prompt              = no
default_md          = sha256
distinguished_name  = req_distinguished_name
req_extensions      = v3_req

[ req_distinguished_name ]
CN = All in One

[ v3_req ]
basicConstraints    = CA:FALSE
keyUsage            = digitalSignature, keyEncipherment
extendedKeyUsage    = serverAuth, clientAuth
subjectKeyIdentifier= hash
subjectAltName      = @alt_names

[ v3_ca ]
basicConstraints    = critical, CA:TRUE
keyUsage            = critical, keyCertSign, cRLSign
subjectKeyIdentifier= hash

[ alt_names ]
DNS.1               = localhost
DNS.2               = *.127-0-0-1.nip.io
DNS.3               = *.cf-system.svc.cluster.local
DNS.4               = *.apps.127-0-0-1.nip.io
DNS.5               = *.blobstore.127-0-0-1.nip.io
DNS.6               = metron
DNS.7               = doppler
DNS.8               = syslog-binding-cache
DNS.9               = cloud-controller
DNS.10              = gorouter
DNS.11              = log-api
DNS.12              = log-cache
DNS.13              = log_cache
DNS.14              = reverse-log-proxy

IP.1                = 127.0.0.1
